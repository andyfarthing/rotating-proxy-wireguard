services:
  wg-proxy:
    build: .
    container_name: wg-proxy

    # ── Required for WireGuard kernel module ────────────────────────────────────
    cap_add:
      - NET_ADMIN

    # ── Volume: mount your WireGuard .conf files here ─────────────────────────
    volumes:
      - ./configs:/etc/wireguard/configs:ro

    # ── Ports ─────────────────────────────────────────────────────────────────
    ports:
      - "8080:8080"   # HTTP/HTTPS proxy (configure clients to use this)
      - "8088:8088"   # Web UI (http://localhost:8088)

    # ── Optional environment overrides ───────────────────────────────────────
    environment:
      PROXY_PORT: "8080"
      WEB_UI_PORT: "8088"
      # Time to wait for a free tunnel before returning 503.
      LEASE_TIMEOUT: "30s"
      # Timeout for dialling upstream through the tunnel.
      DIAL_TIMEOUT: "30s"
      # How often to poll WireGuard stats for the web UI.
      STATS_INTERVAL: "1s"
      # Log verbosity: debug | info | warn | error
      LOG_LEVEL: "info"

    restart: unless-stopped
